<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BakeFlow ERP — Bakery Management System" />
  <title>BakeFlow ERP</title>

  <!-- CSS Load Order: main (tokens + reset) → layout → module sheets -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/inventory.css" />
  <link rel="stylesheet" href="css/production.css" />
  <link rel="stylesheet" href="css/sales.css" />
  <link rel="stylesheet" href="css/reports.css" />
</head>
<body>
  <!-- App Shell -->
  <div class="app-shell" id="app-shell">

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
      <!-- Rendered by js/components/sidebar.js -->
    </aside>

    <!-- Main Content Area -->
    <div class="main-wrapper">
      <!-- Top Navigation Bar -->
      <header class="navbar" id="navbar" role="banner">
        <!-- Rendered by js/components/navbar.js -->
      </header>

      <!-- Module Mount Point -->
      <main class="content" id="app" role="main" aria-live="polite">
        <!-- Loading state shown before app.js boots -->
        <div class="boot-loader" id="boot-loader" aria-label="Loading BakeFlow ERP">
          <div yclass="boot-loader__spinner" aria-hidden="true"></div>
          <p class="boot-loader__text">Loading BakeFlow ERP…</p>
        </div>
      </main>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

  <!-- Modal Container -->
  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <!-- Rendered by js/components/modal.js -->
    </div>
  </div>

  <!-- Entry Point — ES Module -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
